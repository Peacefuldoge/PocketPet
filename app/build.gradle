plugins {
    id 'com.android.application'
}

android {
    namespace 'com.openai.penguingirl.pet'
    compileSdk 34

    defaultConfig {
        applicationId 'com.openai.penguingirl.pet'
        minSdk 23
        targetSdk 34
        versionCode 20600
        versionName '2.6.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
